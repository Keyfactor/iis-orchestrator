<?xml version="1.0" encoding="utf-8"?>
<svg width="700" height="475" viewBox="0 0 700 475" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
        text { font-family: 'Segoe UI', Arial, sans-serif; }
        .title { font-size: 20px; font-weight: 600; fill: #222222; }
